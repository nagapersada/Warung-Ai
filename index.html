<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Warung Pintar AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-gray-900 text-white font-sans"><div class="max-w-6xl mx-auto p-4 pb-24">  <h1 class="text-2xl font-bold mb-4 text-center">Warung Pintar AI</h1>  <div class="grid md:grid-cols-3 gap-4"><!-- Produk -->
<div class="bg-gray-800 p-4 rounded-2xl shadow">
  <h2 class="text-lg font-semibold mb-3">Produk</h2>
  <div id="produk"></div>
</div>

<!-- Keranjang -->
<div class="bg-gray-800 p-4 rounded-2xl shadow">
  <h2 class="text-lg font-semibold mb-3">Keranjang</h2>
  <div id="keranjang"></div>
  <p id="total" class="font-bold mt-3">Total: Rp 0</p>
  <button onclick="bayar()" class="mt-3 w-full bg-green-600 py-2 rounded-xl">
    Bayar
  </button>
</div>

<!-- Tambah Produk -->
<div class="bg-gray-800 p-4 rounded-2xl shadow">
  <h2 class="text-lg font-semibold mb-3">Tambah Produk</h2>

  <input id="nama" placeholder="Nama Produk" class="w-full mb-2 p-2 rounded bg-gray-700 border-none">
  <input id="harga" placeholder="Harga" class="w-full mb-2 p-2 rounded bg-gray-700 border-none">
  <input id="stok" placeholder="Stok" class="w-full mb-2 p-2 rounded bg-gray-700 border-none">

  <button onclick="tambahProduk()" class="w-full bg-blue-600 py-2 rounded-xl">
    Simpan
  </button>
</div>

  </div>  <!-- Laporan -->  <div class="bg-gray-800 p-4 rounded-2xl shadow mt-4">
    <h2 class="text-lg font-semibold mb-3">Laporan</h2>
    <div id="laporan"></div>
  </div></div><!-- Bottom Navigation --><div class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 flex justify-around py-3">
  <button onclick="scrollToTop()" class="text-sm">Home</button>
  <button onclick="focusProduk()" class="text-sm">Produk</button>
  <button onclick="focusKeranjang()" class="text-sm">Keranjang</button>
  <button onclick="focusLaporan()" class="text-sm">Laporan</button>
</div><script>
let produk = [
  {nama:"Mie Instan", harga:3000, stok:20},
  {nama:"Kopi Sachet", harga:2000, stok:30}
];

let keranjang = [];
let total = 0;
let laporan = [];

function render() {
  let pHTML = "";
  produk.forEach((p,i)=>{
    pHTML += `
      <div class="flex justify-between items-center mb-2">
        <div>
          <p class="font-medium">${p.nama}</p>
          <p class="text-xs text-gray-400">Rp ${p.harga} | stok ${p.stok}</p>
        </div>
        <button onclick="beli(${i})" class="bg-green-500 px-2 py-1 rounded">
          +
        </button>
      </div>
    `;
  });
  document.getElementById("produk").innerHTML = pHTML;

  let kHTML = "";
  keranjang.forEach(k=>{
    kHTML += `<p class='text-sm'>${k.nama}</p>`;
  });
  document.getElementById("keranjang").innerHTML = kHTML;

  document.getElementById("total").innerText = "Total: Rp " + total;

  let lHTML = "";
  laporan.forEach(l=>{
    lHTML += `<p class='text-sm'>${l}</p>`;
  });
  document.getElementById("laporan").innerHTML = lHTML;
}

function beli(i){
  if(produk[i].stok <= 0) return;

  produk[i].stok--;
  keranjang.push(produk[i]);
  total += produk[i].harga;

  render();
}

function tambahProduk(){
  let nama = document.getElementById("nama").value;
  let harga = parseInt(document.getElementById("harga").value);
  let stok = parseInt(document.getElementById("stok").value);

  if(!nama || !harga || !stok) return;

  produk.push({nama, harga, stok});

  document.getElementById("nama").value = "";
  document.getElementById("harga").value = "";
  document.getElementById("stok").value = "";

  render();
}

function bayar(){
  if(total === 0) return;

  laporan.unshift("Transaksi: Rp " + total);
  keranjang = [];
  total = 0;

  render();
}

function scrollToTop(){ window.scrollTo({top:0, behavior:'smooth'}); }
function focusProduk(){ document.getElementById('produk').scrollIntoView({behavior:'smooth'}); }
function focusKeranjang(){ document.getElementById('keranjang').scrollIntoView({behavior:'smooth'}); }
function focusLaporan(){ document.getElementById('laporan').scrollIntoView({behavior:'smooth'}); }

render();
</script></body>
    </html>
